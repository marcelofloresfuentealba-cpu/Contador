<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contabilizador Java</title>
    <link rel="stylesheet" href="./assets/css/style.css">
</head>

<body>

    <section>

        <div class="card">
            <div class="img-card"></div>
            <img src="./assets/img/Laptop.webp" alt="">
            <h5>Laptop Gamer AMD</h5>
            <p>Precio Base: <span id="precioBase">$400.000</span></p>

            <div class="control-cantidad">
                <p> Cantidad:
                    <span id="cantidad">0</span>
                    <button id="btnRestar">-</button>
                    <button id="btnSumar">+</button>
                </p>
            </div>
        </div>
    </section>

    <div class="total">
        <h3>Total a pagar: <span id="total">$0</span></h3>
    </div>

    <script src="script.js"></script>


</body>

</html>
